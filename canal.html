<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#020617">
    <title>Novedades | SlotSoftware</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#020617', 
                        card: '#0f172a', 
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            overflow-x: hidden;
        }
        
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        .glow-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .news-card { 
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            transition: all 0.3s ease;
        }
        .news-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.3);
        }

        @keyframes heartBurst {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .heart-active i { animation: heartBurst 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .comments-section {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .comments-section.open {
            max-height: 800px;
            opacity: 1;
            overflow-y: auto;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased relative">

    <div class="bg-grid"></div>
    <div class="glow-blob bg-blue-600 w-96 h-96 top-[-10%] left-[-10%] animate-pulse-slow"></div>
    <div class="glow-blob bg-purple-600 w-80 h-80 top-[40%] right-[-10%] animate-pulse-slow" style="animation-delay: 2s;"></div>
    <div class="glow-blob bg-cyan-600 w-72 h-72 bottom-[-10%] left-[20%] animate-pulse-slow" style="animation-delay: 1s;"></div>

    <header class="sticky top-0 z-50 glass-panel border-b border-white/10 bg-slate-950/80">
        <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-600 rounded-xl blur opacity-70 group-hover:opacity-100 transition duration-200"></div>
                    <div class="relative w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center border border-white/10">
                        <i data-lucide="activity" class="w-5 h-5 text-cyan-400"></i>
                    </div>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg leading-tight tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">SlotSoftware</h1>
                    <p class="text-[10px] text-cyan-400 font-bold tracking-widest uppercase">Canal de Novedades</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-3">
                <a href="https://slotsoftware.github.io/Web/" title="Visitar Web Principal" class="flex items-center gap-1.5 sm:gap-2 text-xs font-bold bg-white/5 hover:bg-white/10 border border-white/10 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl transition-all text-slate-300 hover:text-white group shadow-lg hover:shadow-cyan-500/20">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 group-hover:text-cyan-400 transition-colors"></i>
                    <span class="hidden sm:inline">Web Oficial</span>
                </a>

                <div id="admin-badge" class="hidden items-center gap-1.5 px-3 py-1 bg-gradient-to-r from-red-500/20 to-orange-500/20 text-red-400 rounded-full text-xs font-bold border border-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                    <i data-lucide="shield-alert" class="w-3.5 h-3.5"></i>
                    ADMIN
                </div>
            </div>
        </div>
        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
    </header>

    <main class="flex-grow max-w-2xl mx-auto w-full px-4 py-6 flex flex-col gap-6 relative z-10">
        
        <!-- PANEL DE ADMINISTRADOR -->
        <div id="admin-panel" class="hidden glass-panel rounded-2xl p-6 border border-blue-500/40 shadow-[0_0_40px_rgba(59,130,246,0.15)] relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 blur-3xl rounded-full"></div>
            <h2 class="text-sm font-bold text-white mb-5 flex items-center gap-2">
                <i data-lucide="radio" class="w-5 h-5 text-blue-400 animate-pulse"></i> Transmitir Novedad
            </h2>
            <form id="news-form" class="flex flex-col gap-4 relative z-10">
                <div>
                    <select id="news-category" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all font-medium">
                        <option value="KRONO PERSONAL V.4 TV">KRONO PERSONAL V.4 TV</option>
                        <option value="KRONO DUAL V.4 TV">KRONO DUAL V.4 TV</option>
                        <option value="TRACKS TELEMETRY V.1.0">TRACKS TELEMETRY V.1.0</option>
                        <option value="3D GAME ON LINE V.1.0">3D GAME ON LINE V.1.0</option>
                        <option value="GENERAL">GENERAL</option>
                    </select>
                </div>
                <div>
                    <textarea id="news-text" rows="3" placeholder="Escribe el anuncio espectacular aquí..." class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all resize-none font-medium placeholder-slate-500" required></textarea>
                </div>
                <div>
                    <input type="text" id="news-media" placeholder="URL de Imagen, Vídeo (.mp4) o YouTube (Opcional)" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all font-medium placeholder-slate-500">
                </div>
                <div>
                    <input type="text" id="news-link" placeholder="Enlace a tu web (Opcional)" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all font-medium placeholder-slate-500">
                </div>
                <button type="submit" class="relative group overflow-hidden bg-slate-900 text-white font-bold py-3 rounded-xl transition-all border border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.3)] hover:shadow-[0_0_25px_rgba(59,130,246,0.5)]">
                    <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-cyan-600 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                    <div class="relative flex justify-center items-center gap-2">
                        <i data-lucide="zap" class="w-5 h-5 text-yellow-300"></i> FORZAR ENVÍO A PISTA
                    </div>
                </button>
            </form>
        </div>

        <!-- FILTROS -->
        <div class="overflow-x-auto hide-scrollbar -mx-4 px-4 pb-2 sticky top-20 z-40">
            <div class="flex gap-2 min-w-max p-1 bg-slate-900/50 backdrop-blur-md rounded-2xl border border-white/5 shadow-xl" id="filters-container">
                <button onclick="setFilter('ALL')" class="filter-btn active px-4 py-2 rounded-xl text-sm font-bold bg-gradient-to-r from-blue-600 to-cyan-600 text-white shadow-lg transition-all">Explorar Todo</button>
                <button onclick="setFilter('KRONO PERSONAL V.4 TV')" class="filter-btn px-4 py-2 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all">Krono Personal</button>
                <button onclick="setFilter('KRONO DUAL V.4 TV')" class="filter-btn px-4 py-2 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all">Krono Dual</button>
                <button onclick="setFilter('TRACKS TELEMETRY V.1.0')" class="filter-btn px-4 py-2 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all">Telemetry</button>
                <button onclick="setFilter('3D GAME ON LINE V.1.0')" class="filter-btn px-4 py-2 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all">3D Game</button>
            </div>
        </div>

        <!-- FEED DE NOTICIAS -->
        <div id="feed-container" class="flex flex-col gap-6 pb-10">
            <div id="loading-state" class="flex flex-col items-center justify-center py-20 text-cyan-500">
                <div class="relative">
                    <div class="absolute inset-0 bg-cyan-500 blur-xl opacity-20 rounded-full animate-pulse"></div>
                    <i data-lucide="aperture" class="w-10 h-10 animate-spin relative z-10"></i>
                </div>
                <p class="text-sm font-bold mt-4 tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">Conectando...</p>
            </div>
            
            <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center px-6 animate-float">
                <div class="w-20 h-20 bg-slate-800/50 rounded-full flex items-center justify-center mb-6 border border-slate-700 shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                    <i data-lucide="satellite" class="w-10 h-10 text-slate-500"></i>
                </div>
                <h3 class="text-xl font-bold text-white mb-2 tracking-tight">Pista Despejada</h3>
                <p class="text-slate-400 text-sm max-w-xs">Aún no hay transmisiones. ¡Sé el primero en lanzar una!</p>
            </div>
        </div>
    </main>

    <!-- MODAL NICKNAME -->
    <div id="nickname-modal" class="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-sm rounded-3xl p-6 border border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.2)] transform transition-all">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-cyan-500 rounded-full flex items-center justify-center shadow-lg border-2 border-white/10">
                    <i data-lucide="user-plus" class="w-8 h-8 text-white"></i>
                </div>
            </div>
            <h3 class="text-xl font-bold text-center text-white mb-2">Identificación de Piloto</h3>
            <p class="text-sm text-slate-400 text-center mb-6">Dinos cómo te llamas para poder comentar.</p>
            <form id="nickname-form" class="flex flex-col gap-4">
                <input type="text" id="nickname-input" placeholder="Ej: KronoRacer" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-center text-lg font-bold text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" required maxlength="20">
                <div class="flex gap-3 mt-2">
                    <button type="button" onclick="closeNicknameModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition-all">Cancelar</button>
                    <button type="submit" class="flex-1 bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-cyan-500/20">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL BORRAR -->
    <div id="confirm-modal" class="fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-sm rounded-3xl p-6 border border-red-500/30 shadow-[0_0_50px_rgba(239,68,68,0.2)] transform transition-all text-center">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center border-2 border-red-500/30">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-red-500"></i>
                </div>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">¿Confirmar Borrado?</h3>
            <p class="text-sm text-slate-400 mb-6">Esta acción es permanente.</p>
            <div class="flex gap-3 mt-2">
                <button id="btn-cancel-delete" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition-all">Cancelar</button>
                <button id="btn-confirm-delete" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-red-500/20">Borrar</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.5)] text-sm font-bold transition-all duration-300 opacity-0 pointer-events-none z-[100] flex items-center gap-3 border border-slate-700">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
        <span id="toast-msg">Mensaje</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let allNews = JSON.parse(localStorage.getItem('slot_news_backup')) || [];
        let currentFilter = 'ALL';
        let isAdmin = false;
        let db = null;
        let auth = null;
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'slotsoftware-news';
        let currentUserUid = null;
        let userNickname = localStorage.getItem('slot_nickname') || null; 
        let pendingCommentNewsId = null; 
        let openComments = new Set(); 
        let pendingDeleteAction = null;

        function enableAdmin() {
            isAdmin = true;
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('admin-badge').classList.remove('hidden');
            document.getElementById('admin-badge').classList.add('flex');
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'krono') {
            enableAdmin();
        }

        window.showToast = function(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMsg.innerText = message;
            if (type === 'success') {
                toastIcon.setAttribute('data-lucide', 'check-circle-2');
                toast.className = "fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-900 text-green-400 px-6 py-3 rounded-full shadow-[0_0_30px_rgba(74,222,128,0.2)] text-sm font-bold transition-all duration-300 opacity-100 translate-y-0 pointer-events-none z-[100] flex items-center gap-3 border border-green-500/30";
            } else {
                toastIcon.setAttribute('data-lucide', 'alert-octagon');
                toast.className = "fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-900 text-red-400 px-6 py-3 rounded-full shadow-[0_0_30px_rgba(248,113,113,0.2)] text-sm font-bold transition-all duration-300 opacity-100 translate-y-0 pointer-events-none z-[100] flex items-center gap-3 border border-red-500/30";
            }
            lucide.createIcons();
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        function askConfirmDialog(actionCallback) {
            pendingDeleteAction = actionCallback;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        document.getElementById('btn-cancel-delete').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.add('hidden');
        });
        document.getElementById('btn-confirm-delete').addEventListener('click', () => {
            if (pendingDeleteAction) pendingDeleteAction();
            document.getElementById('confirm-modal').classList.add('hidden');
        });

        window.setFilter = function(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.innerText.toUpperCase() === category || (category === 'ALL' && btn.innerText === 'Explorar Todo')) {
                    btn.className = 'filter-btn active px-4 py-2 rounded-xl text-sm font-bold bg-gradient-to-r from-blue-600 to-cyan-600 text-white shadow-lg transition-all';
                } else {
                    btn.className = 'filter-btn px-4 py-2 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all';
                }
            });
            renderNews();
        };

        function formatDate(timestamp) {
            if (!timestamp) return 'AHORA MISMO';
            const date = new Date(timestamp);
            return date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }).toUpperCase();
        }

        function getCategoryStyle(category) {
            switch(category) {
                case 'KRONO PERSONAL V.4 TV': return 'bg-gradient-to-r from-emerald-400 to-teal-500 text-slate-950 shadow-[0_0_15px_rgba(52,211,153,0.4)]';
                case 'KRONO DUAL V.4 TV': return 'bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white shadow-[0_0_15px_rgba(217,70,239,0.4)]';
                case 'TRACKS TELEMETRY V.1.0': return 'bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 shadow-[0_0_15px_rgba(34,211,238,0.4)]';
                case '3D GAME ON LINE V.1.0': return 'bg-gradient-to-r from-orange-400 to-amber-500 text-slate-950 shadow-[0_0_15px_rgba(251,146,60,0.4)]';
                default: return 'bg-gradient-to-r from-slate-300 to-slate-500 text-slate-950 shadow-lg';
            }
        }

        window.renderNews = function() {
            const container = document.getElementById('feed-container');
            const loadingState = document.getElementById('loading-state');
            const emptyState = document.getElementById('empty-state');
            
            if(loadingState) loadingState.style.display = 'none';

            const existingCards = container.querySelectorAll('.news-card-el');
            existingCards.forEach(card => card.remove());

            let filteredNews = currentFilter === 'ALL' ? allNews : allNews.filter(n => n.category === currentFilter);

            if (filteredNews.length === 0) {
                if(emptyState) emptyState.style.display = 'flex';
                return;
            } else {
                if(emptyState) emptyState.style.display = 'none';
            }

            filteredNews.forEach((news) => {
                const card = document.createElement('div');
                card.className = `news-card-el news-card glass-panel rounded-2xl p-6 flex flex-col gap-4 relative overflow-hidden`;
                
                const glow = document.createElement('div');
                glow.className = 'absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-white/20 to-transparent opacity-50';
                card.appendChild(glow);

                const header = document.createElement('div');
                header.className = 'flex justify-between items-center mb-1';
                
                const badge = document.createElement('span');
                badge.className = `text-[10px] font-extrabold px-3 py-1.5 rounded-lg tracking-widest uppercase border border-white/20 ${getCategoryStyle(news.category)}`;
                badge.innerText = news.category;
                
                const dateText = document.createElement('div');
                dateText.className = 'flex items-center gap-1.5 text-xs text-slate-400 font-bold tracking-wider';
                dateText.innerHTML = `<i data-lucide="clock" class="w-3.5 h-3.5"></i> ${formatDate(news.timestamp)}`;

                header.appendChild(badge);
                header.appendChild(dateText);
                card.appendChild(header);

                const text = document.createElement('p');
                text.className = 'text-[15px] text-slate-100 font-medium leading-relaxed whitespace-pre-wrap';
                text.innerText = news.text;
                card.appendChild(text);

                if (news.mediaUrl) {
                    const mediaContainer = document.createElement('div');
                    mediaContainer.className = 'relative mt-2 rounded-xl overflow-hidden border border-white/10 shadow-[0_8px_30px_rgba(0,0,0,0.4)] group cursor-pointer bg-slate-900';
                    const ytMatch = news.mediaUrl.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
                    const videoMatch = news.mediaUrl.match(/\.(mp4|webm|ogg)$/i);
                    
                    if (ytMatch && ytMatch[1]) {
                        mediaContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" class="w-full aspect-video" allowfullscreen frameborder="0"></iframe>`;
                    } else if (videoMatch) {
                        mediaContainer.innerHTML = `<video src="${news.mediaUrl}" class="w-full aspect-video object-cover" controls preload="metadata"></video>`;
                    } else {
                        const img = document.createElement('img');
                        img.src = news.mediaUrl;
                        img.className = 'w-full h-auto object-cover max-h-80 transition-transform duration-700 group-hover:scale-105';
                        mediaContainer.appendChild(img);
                    }
                    card.appendChild(mediaContainer);
                }

                const bottomBar = document.createElement('div');
                bottomBar.className = 'flex flex-wrap justify-between items-center mt-2 pt-4 border-t border-white/5 gap-3';
                const leftActions = document.createElement('div');
                leftActions.className = 'flex gap-2';

                const isLiked = news.likedBy && news.likedBy.includes(currentUserUid || 'local');
                const likeCount = news.likedBy ? news.likedBy.length : 0;
                
                const likeBtn = document.createElement('button');
                likeBtn.className = `flex items-center gap-2 text-sm font-bold px-4 py-2.5 rounded-xl transition-all border ${isLiked ? 'text-pink-400 bg-pink-500/10 border-pink-500/30 heart-active' : 'text-slate-400 bg-slate-800/50 border-slate-700 hover:text-pink-400'}`;
                likeBtn.innerHTML = `<i data-lucide="heart" class="w-4 h-4 ${isLiked ? 'fill-current' : ''}"></i> <span>${likeCount > 0 ? likeCount : 'Like'}</span>`;
                likeBtn.onclick = () => toggleLike(news.id, isLiked);
                leftActions.appendChild(likeBtn);

                // --- BOTÓN DE CHAT ---
                const commentCount = news.comments ? news.comments.length : 0;
                const commentBtn = document.createElement('button');
                commentBtn.className = `flex items-center gap-2 text-sm font-bold px-4 py-2.5 rounded-xl transition-all border text-slate-400 bg-slate-800/50 border-slate-700 hover:text-cyan-400`;
                commentBtn.innerHTML = `<i data-lucide="message-square" class="w-4 h-4"></i> <span>${commentCount > 0 ? commentCount : 'Chat'}</span>`;
                commentBtn.onclick = () => {
                    if (openComments.has(news.id)) openComments.delete(news.id);
                    else openComments.add(news.id);
                    renderNews(); 
                };
                leftActions.appendChild(commentBtn);

                bottomBar.appendChild(leftActions);

                const rightActions = document.createElement('div');
                rightActions.className = 'flex gap-2 ml-auto';

                if (news.link) {
                    const linkBtn = document.createElement('a');
                    linkBtn.href = news.link;
                    linkBtn.target = '_blank';
                    linkBtn.className = 'inline-flex items-center gap-2 text-sm font-bold text-white px-5 py-2.5 rounded-xl bg-cyan-600 hover:bg-cyan-500 transition-colors';
                    linkBtn.innerHTML = `Ver <i data-lucide="external-link" class="w-4 h-4"></i>`;
                    rightActions.appendChild(linkBtn);
                }

                if (isAdmin) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'inline-flex items-center justify-center w-10 h-10 rounded-xl text-red-400 bg-red-500/10 hover:bg-red-500/20 transition-colors';
                    delBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
                    delBtn.onclick = () => deleteNewsItem(news.id);
                    rightActions.appendChild(delBtn);
                }

                if(rightActions.childNodes.length > 0) bottomBar.appendChild(rightActions);
                card.appendChild(bottomBar);
                
                // --- SECCIÓN DEL CHAT ---
                const commentsSection = document.createElement('div');
                commentsSection.className = `comments-section mt-2 ${openComments.has(news.id) ? 'open' : ''}`;
                
                const commentsInner = document.createElement('div');
                commentsInner.className = 'pt-4 border-t border-white/5 flex flex-col gap-3';
                
                if (news.comments && news.comments.length > 0) {
                    const commentsList = document.createElement('div');
                    commentsList.className = 'flex flex-col gap-2 max-h-48 overflow-y-auto hide-scrollbar mb-2 px-1';
                    news.comments.forEach(c => {
                        commentsList.innerHTML += `
                            <div class="bg-slate-900/80 rounded-xl p-3 border border-white/5 text-sm">
                                <span class="font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400">${c.author}:</span> 
                                <span class="text-slate-300 ml-1">${c.text}</span>
                            </div>`;
                    });
                    commentsInner.appendChild(commentsList);
                }

                const commentForm = document.createElement('form');
                commentForm.className = 'flex gap-2';
                commentForm.onsubmit = (e) => {
                    e.preventDefault();
                    const input = commentForm.querySelector('input');
                    if(!input.value.trim()) return;
                    submitComment(news.id, input.value.trim());
                };
                commentForm.innerHTML = `
                    <input type="text" placeholder="Escribe tu mensaje en la pista..." class="flex-grow bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white focus:border-cyan-500 outline-none transition-all focus:ring-1 focus:ring-cyan-500">
                    <button type="submit" class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white px-4 py-2 rounded-xl transition-all shadow-lg"><i data-lucide="send" class="w-4 h-4"></i></button>
                `;
                commentsInner.appendChild(commentForm);
                commentsSection.appendChild(commentsInner);
                
                card.appendChild(commentsSection);

                container.appendChild(card);
            });

            lucide.createIcons();
        }

        // --- STREAMING_CHUNK:Acción principal - Botón de Fuerza Bruta ---
        document.getElementById('news-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isAdmin) return;

            const newPost = {
                id: 'temp-' + Date.now(), 
                category: document.getElementById('news-category').value,
                text: document.getElementById('news-text').value,
                mediaUrl: document.getElementById('news-media').value.trim(),
                link: document.getElementById('news-link').value.trim(),
                timestamp: Date.now(),
                likedBy: [],
                comments: []
            };

            allNews.unshift(newPost); 
            localStorage.setItem('slot_news_backup', JSON.stringify(allNews));
            
            setFilter('ALL'); 
            renderNews(); 
            
            document.getElementById('news-form').reset(); 
            showToast("¡NOVEDAD EN PISTA!");

            if (db) {
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'news_feed');
                    const postToSave = { ...newPost };
                    delete postToSave.id; 
                    await addDoc(colRef, postToSave);
                } catch (error) {
                    console.error("Error guardando en la nube:", error);
                }
            }
        });

        window.deleteNewsItem = function(docId) {
            askConfirmDialog(async () => {
                allNews = allNews.filter(n => String(n.id) !== String(docId));
                localStorage.setItem('slot_news_backup', JSON.stringify(allNews));
                renderNews(); 
                if (db && !docId.toString().startsWith('temp-')) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news_feed', String(docId)));
                    } catch (e) {}
                }
            });
        };

        window.toggleLike = async function(docId, currentlyLiked) {
            const uid = currentUserUid || 'local';
            const newsItem = allNews.find(n => String(n.id) === String(docId));
            if (newsItem) {
                if (!newsItem.likedBy) newsItem.likedBy = [];
                if (currentlyLiked) newsItem.likedBy = newsItem.likedBy.filter(id => id !== uid);
                else newsItem.likedBy.push(uid);
                renderNews();
            }
            if (db && !docId.toString().startsWith('temp-')) {
                const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'news_feed', String(docId));
                if (currentlyLiked) await updateDoc(postRef, { likedBy: arrayRemove(uid) });
                else await updateDoc(postRef, { likedBy: arrayUnion(uid) });
            }
        };

        // --- LÓGICA DEL CHAT Y NICKNAME ---
        window.closeNicknameModal = function() {
            document.getElementById('nickname-modal').classList.add('hidden');
            pendingCommentNewsId = null;
        };

        document.getElementById('nickname-form').addEventListener('submit', (e) => {
            e.preventDefault();
            userNickname = document.getElementById('nickname-input').value.trim();
            localStorage.setItem('slot_nickname', userNickname);
            closeNicknameModal();
            if (pendingCommentNewsId) {
                executeComment(pendingCommentNewsId.id, pendingCommentNewsId.text);
                pendingCommentNewsId = null;
            }
        });

        window.submitComment = function(newsId, text) {
            userNickname = userNickname || localStorage.getItem('slot_nickname');
            if (!userNickname) {
                pendingCommentNewsId = { id: newsId, text: text };
                document.getElementById('nickname-modal').classList.remove('hidden');
                return;
            }
            executeComment(newsId, text);
        };

        window.executeComment = async function(newsId, text) {
            const newsItem = allNews.find(n => String(n.id) === String(newsId));
            if (newsItem) {
                if (!newsItem.comments) newsItem.comments = [];
                const newComment = { author: userNickname, text: text, timestamp: Date.now() };
                newsItem.comments.push(newComment);
                openComments.add(newsId);
                
                renderNews();

                if (db && !String(newsId).startsWith('temp-')) {
                    try {
                        const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'news_feed', String(newsId));
                        await updateDoc(postRef, { comments: arrayUnion(newComment) });
                    } catch(e) { console.error("Error sincronizando comentario:", e); }
                }
            }
        };

        // --- STREAMING_CHUNK:Arranque del sistema ---
        async function initApp() {
            try {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                const firebaseConfig = JSON.parse(configStr);
                
                if (!firebaseConfig.projectId) {
                    throw new Error("Modo Local (Sin Firebase)");
                }

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserUid = user.uid;
                        const newsRef = collection(db, 'artifacts', appId, 'public', 'data', 'news_feed');
                        onSnapshot(newsRef, (snapshot) => {
                            const fetchedNews = [];
                            snapshot.forEach((docSnap) => {
                                fetchedNews.push({ id: docSnap.id, ...docSnap.data() });
                            });
                            fetchedNews.sort((a, b) => b.timestamp - a.timestamp);
                            allNews = fetchedNews;
                            localStorage.setItem('slot_news_backup', JSON.stringify(allNews));
                            renderNews(); 
                        });
                    }
                });
            } catch (error) {
                document.getElementById('loading-state').style.display = 'none';
                renderNews();
            }
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
