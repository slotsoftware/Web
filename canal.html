<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal de Novedades - SlotSoftware</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: slideOut 0.3s ease-in forwards; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden selection:bg-cyan-500/30 selection:text-cyan-200">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-xl border-b border-white/5 shadow-2xl">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/20 border border-white/10 relative overflow-hidden">
                    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNmZmZmZmYiIGZpbGwtb3BhY2l0eT0iMC4xIi8+PC9zdmc+')] opacity-50"></div>
                    <i data-lucide="radio" class="w-6 h-6 text-white relative z-10"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-xl leading-tight tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">SlotSoftware</h1>
                    <p class="text-[11px] text-cyan-400 font-bold tracking-widest uppercase mt-0.5">Canal de Novedades</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <a href="https://slotsoftware.github.io/Web/" title="Visitar Web Principal" class="flex items-center gap-2 text-xs font-bold bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2 rounded-xl transition-all text-slate-300 hover:text-white group shadow-lg hover:shadow-cyan-500/20">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 group-hover:text-cyan-400 transition-colors"></i>
                    <span class="hidden sm:inline">Web Oficial</span>
                </a>
                <div id="admin-badge" class="hidden items-center gap-1.5 px-3 py-1 bg-gradient-to-r from-red-500/20 to-orange-500/20 text-red-400 rounded-full text-xs font-bold border border-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                    <i data-lucide="shield-alert" class="w-3.5 h-3.5"></i>
                    ADMIN
                </div>
            </div>
        </div>
        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-10 relative">
        <!-- Decoración de fondo -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-cyan-500/5 blur-[120px] rounded-full pointer-events-none -z-10"></div>

        <!-- PANEL DE ADMINISTRADOR (Oculto por defecto, mostrado via JS) -->
        <div id="admin-panel" class="hidden mb-12 bg-slate-800/40 backdrop-blur-md rounded-3xl p-6 sm:p-8 border border-white/10 shadow-2xl relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/5 to-purple-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
            
            <div class="flex items-center gap-3 mb-6 relative z-10">
                <div class="p-2 bg-red-500/10 text-red-400 rounded-lg border border-red-500/20">
                    <i data-lucide="pen-tool" class="w-5 h-5"></i>
                </div>
                <h2 class="text-xl font-bold text-white">Transmitir Nueva Novedad</h2>
            </div>
            
            <form id="news-form" class="space-y-5 relative z-10">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Título</label>
                    <input type="text" id="title" required placeholder="Ej: Nueva versión 2.0 disponible" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Programa</label>
                        <div class="relative">
                            <select id="program" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white appearance-none focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all cursor-pointer">
                                <option value="Krono Personal 4.0" class="bg-slate-800 text-white">Krono Personal 4.0</option>
                                <option value="Krono Dual 4.0" class="bg-slate-800 text-white">Krono Dual 4.0</option>
                                <option value="Tracks Telemetry 1.0" class="bg-slate-800 text-white">Tracks Telemetry 1.0</option>
                                <option value="3D Game 1.0" class="bg-slate-800 text-white">3D Game 1.0</option>
                            </select>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Tipo de aviso</label>
                        <div class="relative">
                            <select id="type" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white appearance-none focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all cursor-pointer">
                                <option value="update" class="bg-slate-800 text-white">Actualización</option>
                                <option value="feature" class="bg-slate-800 text-white">Nueva Función</option>
                                <option value="alert" class="bg-slate-800 text-white">Aviso Importante</option>
                                <option value="info" class="bg-slate-800 text-white">Información</option>
                            </select>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Contenido (Admite saltos de línea)</label>
                    <textarea id="content" required rows="4" placeholder="Describe los detalles de la novedad..." class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all resize-y"></textarea>
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Enlace (Opcional)</label>
                    <input type="url" id="link" placeholder="https://ejemplo.com" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Imagen (URL .jpg, .png)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="image" class="w-4 h-4 text-slate-500"></i>
                            </div>
                            <input type="url" id="imageUrl" placeholder="https://ejemplo.com/imagen.jpg" class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Vídeo (URL .mp4)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="film" class="w-4 h-4 text-slate-500"></i>
                            </div>
                            <input type="url" id="videoUrl" placeholder="https://ejemplo.com/video.mp4" class="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all">
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-end pt-2">
                    <button type="submit" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-cyan-500/25 hover:shadow-cyan-500/40 transition-all duration-300 flex items-center gap-2 transform hover:-translate-y-0.5">
                        <i data-lucide="send" class="w-4 h-4"></i>
                        Publicar Novedad
                    </button>
                </div>
            </form>
        </div>

        <!-- FEED DE NOVEDADES -->
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-extrabold text-white flex items-center gap-3">
                <i data-lucide="activity" class="text-cyan-400 w-6 h-6"></i>
                Últimas Novedades
            </h2>
            <div class="flex gap-2 items-center text-sm text-slate-400">
                <!-- BOTÓN DE NOTIFICACIONES SIEMPRE VISIBLE -->
                <button id="notify-btn" onclick="window.requestNotifications()" class="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 hover:text-indigo-300 rounded-lg transition-colors border border-indigo-500/20 text-xs font-bold shadow-lg shadow-indigo-500/10">
                    <i id="notify-icon" data-lucide="bell" class="w-3.5 h-3.5"></i> 
                    <span id="notify-text" class="hidden sm:inline">Activar Avisos</span>
                </button>
                <span class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> En vivo</span>
            </div>
        </div>

        <div id="news-feed" class="space-y-6">
            <!-- Las noticias se inyectan aquí con JavaScript -->
        </div>
    </main>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-x-[150%] flex items-center gap-3 bg-slate-800 text-white px-5 py-4 rounded-2xl border border-white/10 shadow-2xl z-50 transition-transform duration-300">
        <div class="bg-green-500/20 text-green-400 p-1.5 rounded-lg">
            <i data-lucide="check-circle-2" class="w-5 h-5"></i>
        </div>
        <span id="toast-message" class="font-medium text-sm">Acción completada</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        lucide.createIcons();

        // --- ESTADO GLOBAL ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'slot-software-news';
        let firebaseConfig = null;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        } catch (e) { console.error("Error cargando configuración", e); }

        let db, auth, userId;
        let newsData = [];
        let openComments = new Set();
        let isAdmin = false;

        const newsFeed = document.getElementById('news-feed');
        const newsForm = document.getElementById('news-form');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // --- UTILIDADES ---
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' };
            return new Date(dateString).toLocaleDateString('es-ES', options);
        }

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => { toast.classList.add('translate-x-[150%]'); }, 3000);
        }

        function getTypeStyles(type) {
            switch(type) {
                case 'update': return { icon: 'refresh-cw', bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/20', label: 'Actualización' };
                case 'feature': return { icon: 'star', bg: 'bg-purple-500/10', text: 'text-purple-400', border: 'border-purple-500/20', label: 'Nueva Función' };
                case 'alert': return { icon: 'alert-triangle', bg: 'bg-red-500/10', text: 'text-red-400', border: 'border-red-500/20', label: 'Aviso Importante' };
                default: return { icon: 'info', bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/20', label: 'Información' };
            }
        }

        // --- SISTEMA DE NOTIFICACIONES PUSH (NAVEGADOR) ---
        function updateNotificationUI() {
            const btn = document.getElementById('notify-btn');
            const icon = document.getElementById('notify-icon');
            const text = document.getElementById('notify-text');

            if (!("Notification" in window)) {
                btn.style.display = 'none';
                return;
            }

            if (Notification.permission === 'granted') {
                btn.className = "flex items-center gap-1.5 px-3 py-1.5 bg-green-500/10 text-green-400 rounded-lg border border-green-500/20 text-xs font-bold cursor-default";
                icon.setAttribute('data-lucide', 'bell-ring');
                text.textContent = "Avisos Activados";
            } else if (Notification.permission === 'denied') {
                btn.className = "flex items-center gap-1.5 px-3 py-1.5 bg-red-500/10 text-red-400 rounded-lg border border-red-500/20 text-xs font-bold cursor-help";
                icon.setAttribute('data-lucide', 'bell-off');
                text.textContent = "Avisos Bloqueados";
                btn.title = "Desbloquea las notificaciones en la configuración de tu navegador (el candado junto a la URL)";
            } else {
                btn.className = "flex items-center gap-1.5 px-3 py-1.5 bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 hover:text-indigo-300 rounded-lg transition-colors border border-indigo-500/20 text-xs font-bold shadow-lg shadow-indigo-500/10 cursor-pointer";
                icon.setAttribute('data-lucide', 'bell');
                text.textContent = "Activar Avisos";
            }
            lucide.createIcons();
        }

        window.requestNotifications = async function() {
            if (!("Notification" in window)) {
                showToast("Tu navegador no soporta notificaciones.");
                return;
            }
            if (Notification.permission === 'granted' || Notification.permission === 'denied') return;

            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    showToast("¡Avisos activados con éxito!");
                } else {
                    showToast("Permiso denegado para avisos.");
                }
                updateNotificationUI();
            } catch (error) {
                console.error("Error al pedir permiso:", error);
            }
        };

        // --- INTERACCIONES CON LA NUBE ---
        window.deleteNewsSafely = async function(id) {
            if (!userId) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news_posts', id));
                showToast('Novedad eliminada de la nube');
            } catch (e) { console.error("Error al borrar", e); }
        };

        window.toggleLike = async function(id) {
            if (!userId) return;
            const item = newsData.find(i => i.id === id);
            if (!item) return;

            // Revisar si este usuario ya le dio like
            let updatedLikes = [...(item.likes || [])];
            if (updatedLikes.includes(userId)) {
                updatedLikes = updatedLikes.filter(uid => uid !== userId); // Quitar like
            } else {
                updatedLikes.push(userId); // Dar like
            }

            try {
                // Actualizar documento en la nube
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news_posts', id), { likes: updatedLikes });
            } catch (e) { console.error("Error en like", e); }
        };

        window.toggleComments = function(id) {
            if (openComments.has(id)) openComments.delete(id);
            else openComments.add(id);
            renderNews();
        };

        window.addComment = async function(id) {
            if (!userId) return;
            const input = document.getElementById(`comment-input-${id}`);
            const text = input.value.trim();
            if (!text) return;

            const item = newsData.find(i => i.id === id);
            if (!item) return;

            const newComment = {
                id: Date.now().toString(),
                text: text,
                date: new Date().toISOString(),
                userId: userId
            };

            const updatedComments = [...(item.comments || []), newComment];
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news_posts', id), { comments: updatedComments });
                input.value = '';
            } catch (e) { console.error("Error al comentar", e); }
        };

        window.deleteCommentSafely = async function(newsId, commentId) {
            if (!userId) return;
            const item = newsData.find(i => i.id === newsId);
            if (!item) return;

            const updatedComments = (item.comments || []).filter(c => c.id !== commentId);
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news_posts', newsId), { comments: updatedComments });
                showToast('Comentario eliminado');
            } catch (e) { console.error("Error al borrar comentario", e); }
        };

        // --- RENDERIZADO VISUAL ---
        function renderNews() {
            newsFeed.innerHTML = '';
            
            if (newsData.length === 0) {
                newsFeed.innerHTML = `
                    <div class="text-center py-20 bg-slate-800/30 rounded-3xl border border-white/5 shadow-inner">
                        <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/10 shadow-lg">
                            <i data-lucide="inbox" class="w-8 h-8 text-slate-500"></i>
                        </div>
                        <p class="text-slate-400 font-medium">No hay novedades por ahora.</p>
                        <p class="text-slate-500 text-sm mt-1">¡Mantente atento para futuras actualizaciones!</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            newsData.forEach(item => {
                const article = document.createElement('article');
                article.className = 'group relative bg-slate-800/40 backdrop-blur-md rounded-3xl p-6 sm:p-8 border border-white/10 shadow-xl hover:shadow-cyan-500/10 hover:border-cyan-500/30 transition-all duration-300';
                
                const typeStyle = getTypeStyles(item.type);
                
                const deleteBtnHTML = isAdmin ? `
                    <button class="delete-btn opacity-0 group-hover:opacity-100 transition-opacity p-2.5 bg-slate-900/50 border border-white/5 text-slate-400 hover:text-red-400 hover:bg-red-500/10 hover:border-red-500/20 rounded-xl" data-id="${item.id}" title="Eliminar novedad">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                ` : '';

                const imageHTML = item.imageUrl ? `
                    <div class="mt-5 rounded-xl overflow-hidden border border-white/10 shadow-lg">
                        <img src="${item.imageUrl}" alt="Imagen adjunta" class="w-full h-auto object-cover max-h-[400px]" onerror="this.onerror=null; this.src='https://placehold.co/800x400/0f172a/38bdf8?text=Imagen+No+Disponible';">
                    </div>
                ` : '';

                const videoHTML = item.videoUrl ? `
                    <div class="mt-5 rounded-xl overflow-hidden border border-white/10 shadow-lg bg-black/50">
                        <video controls class="w-full max-h-[400px]">
                            <source src="${item.videoUrl}" type="video/mp4">
                            Tu navegador no soporta el elemento de video.
                        </video>
                    </div>
                ` : '';

                // Estado de Likes y Comentarios a partir de los datos de la Nube
                const isLiked = item.likes && item.likes.includes(userId);
                const likesCount = item.likes ? item.likes.length : 0;
                const commentsList = item.comments || [];
                const isCommentsOpen = openComments.has(item.id);

                const commentsHTML = commentsList.map(c => `
                    <div class="bg-slate-900/50 rounded-xl p-3 sm:p-4 border border-white/5 flex gap-3 group/comment relative">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex-shrink-0 flex items-center justify-center text-white font-bold text-xs shadow-inner border border-white/10">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </div>
                        <div class="flex-1 pr-6">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-bold ${c.userId === userId ? 'text-cyan-400' : 'text-slate-300'}">${c.userId === userId ? 'Tú' : 'Usuario'}</span>
                                <span class="text-[10px] text-slate-500">${formatDate(c.date)}</span>
                            </div>
                            <p class="text-sm text-slate-200">${c.text}</p>
                        </div>
                        ${(isAdmin || c.userId === userId) ? `
                            <button onclick="window.deleteCommentSafely('${item.id}', '${c.id}')" class="absolute top-2 right-2 p-1.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg opacity-0 group-hover/comment:opacity-100 transition-opacity" title="Borrar comentario">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        ` : ''}
                    </div>
                `).join('');

                article.innerHTML = `
                    <div class="flex items-start justify-between gap-4 mb-5">
                        <div class="flex items-center gap-3">
                            <div class="${typeStyle.bg} ${typeStyle.text} p-3 rounded-2xl border ${typeStyle.border} shadow-lg relative overflow-hidden group-hover:scale-110 transition-transform duration-300">
                                <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                <i data-lucide="${typeStyle.icon}" class="w-5 h-5 relative z-10"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1.5 mt-0.5">
                                    <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-700/50 text-slate-300 border border-white/10 uppercase tracking-wider shadow-inner">${item.program || 'Krono'}</span>
                                    <span class="text-[10px] font-extrabold uppercase tracking-widest ${typeStyle.text}">${typeStyle.label}</span>
                                </div>
                                <time class="text-xs text-slate-400 font-medium flex items-center gap-1.5"><i data-lucide="clock" class="w-3.5 h-3.5"></i> ${formatDate(item.date)}</time>
                            </div>
                        </div>
                        ${deleteBtnHTML}
                    </div>
                    
                    <h2 class="text-xl sm:text-2xl font-bold text-white mb-4 group-hover:text-cyan-300 transition-colors leading-tight">${item.title}</h2>
                    <p class="text-slate-300 leading-relaxed text-sm sm:text-base whitespace-pre-wrap">${item.content}</p>
                    
                    ${imageHTML}
                    ${videoHTML}
                    
                    <div class="mt-6 pt-4 border-t border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-2 sm:gap-4">
                            <button onclick="window.toggleLike('${item.id}')" class="flex items-center gap-2 px-3 py-1.5 rounded-lg transition-colors ${isLiked ? 'bg-pink-500/10 text-pink-500 border border-pink-500/20 shadow-[0_0_15px_rgba(236,72,153,0.15)]' : 'text-slate-400 hover:bg-white/5 hover:text-pink-400'}">
                                <i data-lucide="heart" class="w-4 h-4 sm:w-5 sm:h-5 ${isLiked ? 'fill-current' : ''}"></i>
                                <span class="font-bold text-sm">${likesCount}</span>
                            </button>
                            <button onclick="window.toggleComments('${item.id}')" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-slate-400 hover:bg-white/5 hover:text-cyan-400 transition-colors">
                                <i data-lucide="message-square" class="w-4 h-4 sm:w-5 sm:h-5 ${isCommentsOpen ? 'fill-current opacity-20' : ''}"></i>
                                <span class="font-bold text-sm">${commentsList.length}</span>
                            </button>
                        </div>
                        ${item.link ? `
                            <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 text-xs sm:text-sm text-cyan-400 hover:text-cyan-300 font-bold group/link transition-colors bg-cyan-500/10 hover:bg-cyan-500/20 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg border border-cyan-500/20">
                                <span>Detalles</span>
                                <i data-lucide="external-link" class="w-3.5 h-3.5 group-hover/link:-translate-y-0.5 group-hover/link:translate-x-0.5 transition-transform"></i>
                            </a>
                        ` : ''}
                    </div>

                    <div class="${isCommentsOpen ? 'block' : 'hidden'} mt-4 pt-4 border-t border-white/5">
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="comment-input-${item.id}" placeholder="Escribe un comentario público..." class="flex-1 bg-slate-900/80 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all">
                            <button onclick="window.addComment('${item.id}')" class="bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500/30 hover:text-cyan-300 px-4 py-2 rounded-xl transition-colors border border-cyan-500/20 flex items-center justify-center">
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                            ${commentsList.length > 0 ? commentsHTML : '<p class="text-xs text-slate-500 text-center py-2">Sé el primero en comentar.</p>'}
                        </div>
                    </div>
                `;

                newsFeed.appendChild(article);
            });

            lucide.createIcons();
            
            if (isAdmin) {
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        const id = this.getAttribute('data-id');
                        window.deleteNewsSafely(id);
                    });
                });
            }
        }

        // --- GESTIÓN DE PUBLICACIÓN ---
        newsForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!userId) {
                showToast("Error de conexión");
                return;
            }
            
            const newId = Date.now().toString();
            const newNews = {
                title: document.getElementById('title').value,
                program: document.getElementById('program').value,
                type: document.getElementById('type').value,
                content: document.getElementById('content').value,
                link: document.getElementById('link').value,
                imageUrl: document.getElementById('imageUrl').value,
                videoUrl: document.getElementById('videoUrl').value,
                likes: [],
                comments: [],
                date: new Date().toISOString(),
                authorId: userId // Guardamos quién la publicó para no auto-notificarle
            };

            try {
                // Guardar nueva publicación directo a Firestore
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'news_posts', newId), newNews);
                newsForm.reset();
                showToast('¡Novedad publicada en la nube!');
            } catch (error) {
                console.error("Error publicando:", error);
                showToast('Hubo un error al publicar');
            }
        });

        // --- ARRANQUE DE LA APLICACIÓN ---
        async function initApp() {
            // Doble clic oculto para ser Admin
            document.querySelector('header h1').addEventListener('dblclick', () => {
                isAdmin = !isAdmin;
                const adminPanel = document.getElementById('admin-panel');
                const adminBadge = document.getElementById('admin-badge');
                if (isAdmin) {
                    adminPanel.classList.remove('hidden');
                    adminBadge.classList.remove('hidden');
                    adminBadge.classList.add('flex');
                    showToast('Modo Admin Activado');
                } else {
                    adminPanel.classList.add('hidden');
                    adminBadge.classList.add('hidden');
                    adminBadge.classList.remove('flex');
                    showToast('Modo Admin Desactivado');
                }
                renderNews();
            });

            // Mensaje de carga inicial
            newsFeed.innerHTML = '<div class="text-center py-20 text-cyan-400 font-bold animate-pulse flex flex-col items-center justify-center gap-3"><i data-lucide="cloud" class="w-8 h-8"></i> Conectando al servidor en la nube...</div>';
            lucide.createIcons();

            if (!firebaseConfig) {
                newsFeed.innerHTML = '<div class="text-center py-20 text-red-400">Error: Conexión a la nube no configurada.</div>';
                return;
            }

            try {
                // Inicializar Firebase
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Autenticación Segura
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                userId = auth.currentUser.uid;
                
                updateNotificationUI();

                // Escuchar Novedades en TIEMPO REAL
                const newsRef = collection(db, 'artifacts', appId, 'public', 'data', 'news_posts');
                let initialLoad = true;

                onSnapshot(newsRef, (snapshot) => {
                    // Lógica para enviar notificación si detecta un documento nuevo
                    if (!initialLoad && "Notification" in window && Notification.permission === 'granted') {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === 'added') {
                                const docData = change.doc.data();
                                // Disparar notificación solo si la noticia no la publicó el propio usuario que está mirando
                                if (docData.authorId !== userId) {
                                    new Notification("SlotSoftware: " + (docData.program || "Novedad"), {
                                        body: docData.title,
                                        icon: "https://slotsoftware.github.io/Web/logo.png" // Usará tu icono de forma predeterminada
                                    });
                                }
                            }
                        });
                    }

                    newsData = [];
                    snapshot.forEach(doc => {
                        newsData.push({ id: doc.id, ...doc.data() });
                    });
                    // Ordenar por fecha (las más nuevas primero)
                    newsData.sort((a, b) => new Date(b.date) - new Date(a.date));
                    renderNews();
                    
                    initialLoad = false;
                }, (error) => {
                    console.error("Firestore error:", error);
                    newsFeed.innerHTML = '<div class="text-center py-20 text-red-400">Error al sincronizar con la nube.</div>';
                });

            } catch (error) {
                console.error("Auth init error:", error);
                newsFeed.innerHTML = '<div class="text-center py-20 text-red-400">No se pudo establecer conexión segura.</div>';
            }
        }

        initApp();
    </script>
</body>
</html>
